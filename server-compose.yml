services:
  node_app:
    image: node:18-alpine
    container_name: centrals
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install --production --legacy-peer-deps && npm start"
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DB_HOST: mariadb_db       # matches MySQL container name
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: fyish_01
      REDIS_HOST: redis-container
      REDIS_PORT: 6379
      KAFKA_BROKER: kafka:9092
      JWTKEY: SECRETKEY
      SIGNATURE_SECRET: HAPPYHOURS
      BCRYPT_SECRET_KEY : LARGEMACHINE
      JWT_SECRET: MAXSTADIUM
      MAILER_URL: http://mailing:3014/
      REFRESHTOKEN_KEY: ROLLERGOSTER
      
    networks:
      - database_network      # same network
      - app_net               # optional if you need other services
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: always

networks:
  app_net:
    external: true
  database_network:
    driver: bridge
