services:
  node_app:
    image: centrals:latest
    container_name: centrals

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      DB_HOST: mariadb_db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: fyish_01
      REDIS_HOST: redis-container
      REDIS_PORT: 6379
      KAFKA_BROKER: kafka:9092

    networks:
      - database_network
      - app_net

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: always

networks:
  app_net:
    external: true

  database_network:
    driver: bridge